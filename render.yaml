services:
  - type: web
    name: hanry-ai-supply-chain
    runtime: node
    plan: free
    region: oregon
    repo: https://github.com/hanryluo-LA/ai-supply-chain-dashboard
    branch: main
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
